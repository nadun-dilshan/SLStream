name: Stream health check

on:
  schedule:
    - cron: '30 21 * * *' # nightly at 03:00 Sri Lanka time (UTC+5:30)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Probe all stream URLs
        run: node scripts/check-streams.mjs

      - name: Fetch EPG data (best effort)
        run: node scripts/fetch-epg.mjs || true

      - name: Commit updated status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/streamStatus.json public/epg.json
          git diff --cached --quiet || git commit -m "chore: nightly stream health + EPG refresh"
          git push
